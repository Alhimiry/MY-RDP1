name: Windows Workflow Clean (Node 24 Ready)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Show System Info
        shell: powershell
        run: |
          Write-Host "Workflow running on Windows Runner"
          node -v
          npm -v
          Get-ComputerInfo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
